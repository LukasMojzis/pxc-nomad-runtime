name: images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: pxc-runtime
            context: runtime
            dockerfile: runtime/Dockerfile.pxc
            tag: ghcr.io/lukasmojzis/pxc-nomad-pxc-runtime:8.4
          - name: garbd-runtime
            context: runtime
            dockerfile: runtime/Dockerfile.garbd
            tag: ghcr.io/lukasmojzis/pxc-nomad-garbd-runtime:8.4
          - name: pxc-control
            context: control
            dockerfile: control/Dockerfile
            tag: ghcr.io/lukasmojzis/pxc-nomad-control:latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: actions/setup-go@v5
        if: matrix.context == 'runtime'
        with:
          go-version-file: runtime/go.mod

      - name: Test runtime helper
        if: matrix.context == 'runtime'
        run: go test -buildvcs=false ./...
        working-directory: runtime

      - name: Build runtime helper
        if: matrix.context == 'runtime'
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -buildvcs=false -o pxc-runtime .
        working-directory: runtime

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/LukasMojzis/pxc-nomad-runtime
            org.opencontainers.image.description=Nomad runtime helper for Percona XtraDB Cluster
